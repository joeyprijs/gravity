<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gravity Studio</title>
  <link rel="stylesheet" href="css/studio.css">
</head>
<body>
  <div id="app">
    <header id="toolbar">
      <span class="logo">Gravity <span>Studio</span></span>
      <button class="btn btn-secondary" id="btn-open">Open Workspace</button>
      <button class="btn btn-primary" id="btn-save" disabled>Save</button>
      <button class="btn btn-secondary" id="btn-validate" disabled>Validate</button>
      <button class="btn btn-danger" id="btn-reset" disabled>Reset Data</button>
      <button class="btn btn-secondary" id="btn-preview" disabled>Preview</button>
      <span id="status-text"></span>
    </header>
    <div id="main">
      <nav id="sidebar">
        <div id="sidebar-placeholder">Open a workspace<br>to get started.</div>
      </nav>
      <main id="editor">
        <div id="editor-placeholder">Select a file from the sidebar.</div>
      </main>
      <aside id="preview-pane" hidden>
        <div id="preview-header">
          <span>Live Preview</span>
          <div class="preview-actions">
            <label class="preview-auto" title="Reload automatically a moment after each edit">
              <input type="checkbox" id="preview-auto"> Auto
            </label>
            <button class="btn btn-secondary btn-sm" id="btn-preview-reload" title="Reload preview with current edits">&#x21bb; Reload</button>
            <button class="btn btn-secondary btn-sm" id="btn-preview-close" title="Close preview">&#x2715;</button>
          </div>
        </div>
        <div id="preview-validation" class="preview-validation" hidden title="Click for validation details"></div>
        <div id="preview-frame-wrap"></div>
      </aside>
    </div>
  </div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
