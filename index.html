<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vanilla JS RPG Engine</title>
  <link id="theme-stylesheet" rel="stylesheet" href="css/styles.css">
</head>

<body>
  <!-- Character creation overlay — shown for new games, hidden on save load -->
  <div id="char-creation" class="char-creation-overlay"></div>

  <!-- File input lives outside game-container so it's accessible from char creation too -->
  <input type="file" id="file-upload" accept=".json" class="controls__hidden-input">

  <div class="game" id="game-container" hidden>
    <div class="game__main" id="main-content">
      <aside class="game__player" id="player-panel">
        <!-- Tab buttons and panels are generated dynamically from rules.json tabs -->
        <nav class="tabs__nav"></nav>
      </aside>

      <main class="game__scene" id="scene-panel">
        <div class="scene__narrative" id="scene-narrative"></div>
      </main>

      <div class="game__scene-options" id="scene-options-panel">
        <div class="panel-section" id="scene-options">
          <div class="section-heading" id="scene-location-reminder"></div>
          <!-- Action buttons injected here -->
        </div>
        <div class="panel-section panel-section--skills" id="scene-options-skills" hidden></div>
      </div>

      <div class="fullmap-overlay" id="fullmap-overlay" hidden>
        <div class="fullmap-overlay__panel">
          <div class="fullmap-overlay__header">
            <h3 class="fullmap-overlay__title" id="fullmap-title"></h3>
            <button class="button fullmap-close" id="fullmap-close">&#x2715;</button>
          </div>
          <div class="fullmap-overlay__inner">
            <div class="fullmap__canvas" id="fullmap-canvas"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="src/core/engine.js"></script>
</body>

</html>
