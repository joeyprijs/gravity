<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vanilla JS RPG Engine</title>
  <link id="theme-stylesheet" rel="stylesheet" href="css/styles.css">
</head>

<body>
  <!-- Character creation overlay — shown for new games, hidden on save load -->
  <div id="char-creation" class="char-creation-overlay"></div>

  <!-- File input lives outside game-container so it's accessible from char creation too -->
  <input type="file" id="file-upload" accept=".json" class="controls__hidden-input">

  <div class="game" id="game-container" hidden>
    <header class="game__header" id="player-header">
      <!-- Vitals: the moment-to-moment stats stay always visible. Slow-moving
           character stats live in the sheet row below, toggled by the name. -->
      <div class="game__stats" id="player-basic-stats">
        <div class="stat-group">
          <button class="stat-item stat-item--name" id="btn-toggle-sheet" type="button" aria-expanded="false" aria-controls="player-sheet-stats">
            <span data-stat-bind="name"></span><span class="stat-item--name__caret">▾</span>
          </button>
        </div>
        <div class="stat-group">
          <div class="stat-item stat-item--hp">
            <span class="stat-item__label">HP</span>
            <span class="stat-item__value"><span data-stat-bind="resources.hp.current"></span>/<span data-stat-bind="resources.hp.max"></span></span>
          </div>
          <div class="stat-item stat-item--ap">
            <span class="stat-item__label">AP</span>
            <span class="stat-item__value"><span data-stat-bind="resources.ap.current"></span>/<span data-stat-bind="resources.ap.max"></span></span>
          </div>
        </div>
        <div class="stat-group">
          <div class="stat-item stat-item--gold">
            <span class="stat-item__label">GOLD</span>
            <span class="stat-item__value" data-stat-bind="resources.gold"></span>
          </div>
        </div>
      </div>
      <div class="game__controls controls">
        <button class="button" id="btn-save">Save</button>
        <button class="button" id="btn-load">Load</button>
        <button class="button" id="btn-restart">Restart</button>
      </div>
      <div class="game__stats game__stats--sheet" id="player-sheet-stats" hidden>
        <div class="stat-group">
          <div class="stat-item">
            <span class="stat-item__label">LVL</span>
            <span class="stat-item__value" data-stat-bind="level"></span>
          </div>
          <div class="stat-item">
            <span class="stat-item__label">AC</span>
            <span class="stat-item__value" data-stat-bind="attributes.ac"></span>
          </div>
          <div class="stat-item">
            <span class="stat-item__label">INIT</span>
            <span class="stat-item__value" data-stat-bind="attributes.initiative"></span>
          </div>
        </div>
      </div>
    </header>
    <div class="game__main" id="main-content">
      <aside class="game__player" id="player-panel">
        <!-- Tab buttons and panels are generated dynamically from rules.json tabs -->
        <nav class="tabs__nav"></nav>
      </aside>

      <main class="game__scene" id="scene-panel">
        <div class="scene__narrative" id="scene-narrative"></div>
      </main>

      <div class="game__scene-options" id="scene-options-panel">
        <div class="scene__options" id="scene-options">
          <div class="scene__section-heading" id="scene-location-reminder"></div>
          <!-- Action buttons injected here -->
        </div>
        <div class="scene__options scene__options--skills" id="scene-options-skills" hidden></div>
      </div>

      <div class="fullmap-overlay" id="fullmap-overlay" hidden>
        <div class="fullmap-overlay__panel">
          <div class="fullmap-overlay__header">
            <h3 class="fullmap-overlay__title" id="fullmap-title"></h3>
            <button class="button fullmap-close" id="fullmap-close">&#x2715;</button>
          </div>
          <div class="fullmap-overlay__inner">
            <div class="fullmap__canvas" id="fullmap-canvas"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="src/core/engine.js"></script>
</body>

</html>
