name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Unit and data-integrity tests
        run: npm test
      - name: Manifest is in sync with the data tree
        run: node scripts/generate-manifest.js --check
      - name: Data files are in canonical expanded form
        run: node scripts/format-data.js --check
